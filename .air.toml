root = "."
tmp_dir = ".cache/air"

[build]
cmd = "go build -tags dev -o .cache/air/coffee_server ."
bin = ".cache/air/coffee_server"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["bin", ".cache", "host_conf", "deploy"]
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = true
